<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mzansi Snake</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
margin:0;
text-align:center;
font-family:Arial;
background:#111;
color:white;
}
canvas{
background:#002f6c;
margin-top:20px;
border:4px solid #ffcc00;
}
button{
padding:10px 20px;
margin-top:10px;
background:#00ff88;
border:none;
border-radius:6px;
font-weight:bold;
}
#leaderboard{
margin-top:20px;
}
</style>
</head>

<body>

<h1>Mzansi Snake</h1>
<h3>MzansiPoints: <span id="score">0</span></h3>

<canvas id="game" width="400" height="400"></canvas>
<br>
<button onclick="startGame()">Start Game</button>

<div id="leaderboard">
<h3>National Top 10</h3>
<div id="scores"></div>
</div>

<script>
// 🔐 REPLACE WITH YOUR mzansi-core CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_AUTH",
  projectId: "mzansi-core",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.signInAnonymously();

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let box = 20;
let snake;
let food;
let score;
let direction;
let game;

function init(){
snake = [{x:9*box,y:9*box}];
food = {x:Math.floor(Math.random()*19)*box,y:Math.floor(Math.random()*19)*box};
score = 0;
direction=null;
document.getElementById("score").innerText=score;
}

document.addEventListener("keydown",event=>{
if(event.key==="ArrowLeft" && direction!=="RIGHT") direction="LEFT";
if(event.key==="ArrowUp" && direction!=="DOWN") direction="UP";
if(event.key==="ArrowRight" && direction!=="LEFT") direction="RIGHT";
if(event.key==="ArrowDown" && direction!=="UP") direction="DOWN";
});

function draw(){
ctx.clearRect(0,0,400,400);

for(let i=0;i<snake.length;i++){
ctx.fillStyle=i===0?"#ffcc00":"#00ff88";
ctx.fillRect(snake[i].x,snake[i].y,box,box);
}

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,box,box);

let headX=snake[0].x;
let headY=snake[0].y;

if(direction==="LEFT") headX-=box;
if(direction==="UP") headY-=box;
if(direction==="RIGHT") headX+=box;
if(direction==="DOWN") headY+=box;

if(headX===food.x && headY===food.y){
score++;
document.getElementById("score").innerText=score;
food={x:Math.floor(Math.random()*19)*box,y:Math.floor(Math.random()*19)*box};
}else{
snake.pop();
}

let newHead={x:headX,y:headY};

if(headX<0||headY<0||headX>=400||headY>=400||collision(newHead,snake)){
clearInterval(game);
saveScore(score);
alert("Game Over");
return;
}

snake.unshift(newHead);
}

function collision(head,array){
for(let i=0;i<array.length;i++){
if(head.x===array[i].x && head.y===array[i].y){
return true;
}
}
return false;
}

function startGame(){
init();
clearInterval(game);
game=setInterval(draw,100);
}

function saveScore(points){
auth.onAuthStateChanged(user=>{
if(user){
db.collection("snake_scores").add({
uid:user.uid,
score:points,
created:Date.now()
});
loadLeaderboard();
}
});
}

function loadLeaderboard(){
db.collection("snake_scores")
.orderBy("score","desc")
.limit(10)
.get()
.then(snapshot=>{
let html="";
snapshot.forEach(doc=>{
html+="<div>"+doc.data().score+" points</div>";
});
document.getElementById("scores").innerHTML=html;
});
}

loadLeaderboard();
</script>

</body>
</html>
